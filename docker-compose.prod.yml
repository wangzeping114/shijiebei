services:
  db:
    image: postgres:16-alpine
    container_name: shijiebei-db
    restart: always
    env_file:
      - .env.backend
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - shijiebei-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - shijiebei-net

  backend:
    image: ghcr.io/wangzeping114/shijiebei-backend:latest
    container_name: shijiebei-backend
    restart: always
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shijiebei-net

  frontend:
    image: ghcr.io/wangzeping114/shijiebei-frontend:latest
    container_name: shijiebei-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - shijiebei-net

networks:
  shijiebei-net:
    driver: bridge

volumes:
  shijiebei-pgdata:
